# ─── ForecastAI Bootstrap Configuration ────────────────────────────────────────
# This is the ONLY file that cannot be stored in the database — it is needed
# to CONNECT to the database in the first place.
#
# All other settings (auth, ETL source DB, logging, forecasting parameters,
# etc.) are stored in the database under Settings → System / Business Config.
#
# Alternatively, set the equivalent DB_* environment variables (or populate
# a .env file) — db.py tries config.yaml first, then falls back to env vars.

database:
  host: localhost
  port: 5432
  name: postgres
  user: postgres
  password: postgres
  schema: zcube
  sslmode: disable
