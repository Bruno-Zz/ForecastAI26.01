data_source:
  type: postgres
  source_db:
    host: ep-gentle-rain-a5ba1hxu.us-east-2.aws.neon.tech
    port: 5432
    database: scenario
    user: ketteq
    password: Zpg2TBlQydP1
    sslmode: require
    demand_table: dp_plan.calc_dp_actual
    columns:
      item_id: item_id
      site_id: site_id
      date: date
      qty: qty
      channel: channel_id
  postgres:
    host: localhost
    port: 5432
    database: postgres
    schema: zcube
    user: postgres
    password: postgres
    sslmode: disable
    tables:
      item: zcube.item
      site: zcube.site
      demand_actual: zcube.demand_actuals
      detected_outliers: zcube.detected_outliers
      time_series_characteristics: zcube.time_series_characteristics
      forecast_results: zcube.forecast_results
      backtest_metrics: zcube.backtest_metrics
      forecasts_by_origin: zcube.forecasts_by_origin
      best_method_per_series: zcube.best_method_per_series
      fitted_distributions: zcube.fitted_distributions
      forecast_adjustments: zcube.forecast_adjustments
      process_log: zcube.process_log
  s3:
    bucket: demand-data
    prefix: time_series/
    region: us-east-1
  azure:
    container: demand-data
    account_name: ${AZURE_ACCOUNT}
    account_key: ${AZURE_KEY}
etl:
  output_table: zcube.demand_actuals
  partition_by:
  - hierarchy_level_1
  - category
  query:
    date_column: date
    value_column: qty
    id_column: item_id
    hierarchy_columns:
    - hierarchy_level_1
    - hierarchy_level_2
    - hierarchy_level_3
    min_date: '2020-01-01'
    max_date: null
    min_observations: 52
  aggregation:
    frequency: W
    method: sum
outlier_detection:
  enabled: true
  detection_method: iqr
  correction_method: clip
  iqr:
    multiplier: 1.5
  zscore:
    threshold: 3.0
    use_mad: true
  stl_residuals:
    seasonal_period: 52
    residual_threshold: 3.0
  correction:
    interpolation_method: linear
    median_window: 5
  min_observations: 6
characterization:
  seasonality:
    test_periods:
    - 4
    - 13
    - 26
    - 52
    significance_level: 0.05
    min_strength: 0.3
  trend:
    method: mann_kendall
    significance_level: 0.05
  intermittency:
    zero_threshold: 0.5
    adi_threshold: 1.32
    cov_threshold: 0.49
  stationarity:
    test: adf
    significance_level: 0.05
  data_sufficiency:
    min_for_ml: 20
    min_for_deep_learning: 30
    sparse_obs_per_year: 5
forecasting:
  horizon: 52
  frequency: W
  backtesting:
    n_windows: 3
    step_size: 4
    min_train_size: 52
  confidence_levels:
  - 10
  - 25
  - 50
  - 75
  - 90
  - 95
  - 99
  method_selection:
    sparse_data:
    - SeasonalNaive
    - HistoricAverage
    - TimesFM
    intermittent:
    - CrostonOptimized
    - ADIDA
    - IMAPA
    - TimesFM
    seasonal:
    - MSTL
    - AutoETS
    - NHITS
    - PatchTST
    - TimesFM
    - LightGBM
    complex:
    - NHITS
    - NBEATS
    - TFT
    - PatchTST
    - AutoETS
    - LightGBM
    - XGBoost
    standard:
    - AutoETS
    - AutoARIMA
    - AutoTheta
    - NHITS
    - TimesFM
    - LightGBM
  ml_models:
  - LightGBM
  - XGBoost
  statsforecast_models:
  - AutoARIMA
  - AutoETS
  - AutoTheta
  - AutoCES
  - MSTL
  - CrostonOptimized
  - ADIDA
  - IMAPA
  - HistoricAverage
  - SeasonalNaive
  neuralforecast_models:
  - NHITS
  - NBEATS
  - PatchTST
  - TFT
  - DeepAR
  timesfm:
    model_name: timesfm-1.0-200m
    context_length: 512
    horizon_length: 128
    quantiles:
    - 0.1
    - 0.25
    - 0.5
    - 0.75
    - 0.9
    - 0.95
    - 0.99
hierarchical:
  enabled: true
  reconciliation_methods:
  - BottomUp
  - TopDown
  - MinTrace
  - ERM
  structure:
    levels:
    - hierarchy_level_1
    - hierarchy_level_2
    - hierarchy_level_3
    - sku_id
evaluation:
  metrics:
    point_forecast:
    - mae
    - rmse
    - mape
    - smape
    - bias
    - mase
    probabilistic:
    - winkler_score
    - crps
    - coverage
    - quantile_loss
    information_criteria:
    - aic
    - bic
    - aicc
best_method:
  weights:
    mae: 0.4
    rmse: 0.2
    bias: 0.15
    coverage_90: 0.15
    mase: 0.1
meio:
  enabled: true
  distributions:
  - normal
  - gamma
  - negative_binomial
  - lognormal
  fitting_method: quantile_matching
  service_levels:
  - 0.9
  - 0.95
  - 0.99
parallel:
  backend: dask
  dask:
    scheduler: processes
    n_workers: 64
    threads_per_worker: 2
    memory_limit: auto
    heartbeat_interval: 10s
    death_timeout: 120
    distributed:
      scheduler_address: null
  batch_size: 100
output:
  base_path: ./output
  save:
    forecasts: true
    characteristics: true
    metrics: true
    distributions: true
    hyperparameters: true
    plots: true
  formats:
    forecasts: postgres
    metrics: postgres
    plots: png
auth:
  jwt_secret: "CHANGE-ME-use-a-random-64-char-string-in-production"
  token_expiry_minutes: 480
  microsoft:
    client_id: "YOUR-AZURE-APP-CLIENT-ID"
    tenant_id: "YOUR-AZURE-TENANT-ID"
    redirect_uri: "http://localhost:5173"
  google:
    client_id: "YOUR-GOOGLE-CLIENT-ID"
  default_admin:
    email: "admin@forecastai.local"
    display_name: "Admin"
    password: "ChangeMe123!"
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: ./logs/forecasting.log
  console: true
