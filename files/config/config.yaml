# Forecasting System Configuration

# Data Source Configuration
data_source:
  type: "postgres"  # Options: postgres, s3, azure, local

  # ── Source database (Neon remote) — used by ETL extract step ──
  source_db:
    host: "ep-gentle-rain-a5ba1hxu.us-east-2.aws.neon.tech"
    port: 5432
    database: "scenario"
    user: "ketteq"
    password: "Zpg2TBlQydP1"
    sslmode: "require"

    # Source table for demand actuals
    demand_table: "dp_plan.calc_dp_actual"

    # Column mapping: source column → canonical name
    # Adjust these if the remote table has different column names
    columns:
      item_id: "item_id"
      site_id: "site_id"
      date: "date"
      qty: "qty"
      channel: "channel_id"     # remote column name (mapped to 'channel' locally)

  # ── Local working database — used by all pipeline steps ──
  postgres:
    host: "localhost"
    port: 5432
    database: "postgres"
    schema: "zcube"
    user: "postgres"
    password: "postgres"
    sslmode: "disable"

    # Table mappings (local working tables)
    tables:
      item: "zcube.item"
      site: "zcube.site"
      demand_actual: "zcube.demand_actuals"
      detected_outliers: "zcube.detected_outliers"
      time_series_characteristics: "zcube.time_series_characteristics"
      forecast_results: "zcube.forecast_results"
      backtest_metrics: "zcube.backtest_metrics"
      forecasts_by_origin: "zcube.forecasts_by_origin"
      best_method_per_series: "zcube.best_method_per_series"
      fitted_distributions: "zcube.fitted_distributions"
      forecast_adjustments: "zcube.forecast_adjustments"
      process_log: "zcube.process_log"
  
  # S3 configuration (alternative)
  s3:
    bucket: "demand-data"
    prefix: "time_series/"
    region: "us-east-1"
  
  # Azure configuration (alternative)
  azure:
    container: "demand-data"
    account_name: "${AZURE_ACCOUNT}"
    account_key: "${AZURE_KEY}"

# ETL Configuration
etl:
  # Output is written directly to PostgreSQL (zcube.demand_actuals)
  # output_path is kept for backward-compatibility but no parquet is written.
  output_table: "zcube.demand_actuals"
  partition_by: ["hierarchy_level_1", "category"]  # Partition strategy
  
  # Query configuration
  query:
    date_column: "date"
    value_column: "qty"
    id_column: "item_id"
    hierarchy_columns: ["hierarchy_level_1", "hierarchy_level_2", "hierarchy_level_3"]
    
    # Filters
    min_date: "2020-01-01"
    max_date: null  # null = use current date
    
    # Data quality filters
    min_observations: 12  # Minimum number of observations per time series
    
  # Aggregation if needed
  aggregation:
    frequency: "M"  # D=Daily, W=Weekly, M=Monthly
    method: "sum"   # sum, mean, median

# Outlier Detection & Correction
outlier_detection:
  enabled: true
  detection_method: "iqr"          # iqr | zscore | stl_residuals
  correction_method: "clip"        # clip | interpolate | median | none

  # IQR method parameters
  iqr:
    multiplier: 1.5                # k * IQR beyond Q1/Q3

  # Z-Score method parameters
  zscore:
    threshold: 3.0                 # |z| > threshold flagged
    use_mad: true                  # Use median/MAD instead of mean/std

  # STL decomposition residuals method parameters
  stl_residuals:
    seasonal_period: 12            # STL seasonal period
    residual_threshold: 3.0        # Residual z-score threshold

  # Correction parameters
  correction:
    interpolation_method: "linear" # For interpolate correction method
    median_window: 5               # For median replacement window

  min_observations: 6              # Skip detection for very short series

# Time Series Characterization
characterization:
  # Seasonality detection
  seasonality:
    test_periods: [7, 30, 365]  # Days for daily data, adjust for monthly
    significance_level: 0.05
    min_strength: 0.3  # Minimum seasonal strength to consider significant
  
  # Trend detection
  trend:
    method: "mann_kendall"  # Options: mann_kendall, linear_regression
    significance_level: 0.05
  
  # Intermittency thresholds
  intermittency:
    zero_threshold: 0.5  # % of zeros to consider intermittent
    adi_threshold: 1.32  # Average inter-demand interval threshold
    cov_threshold: 0.49  # Coefficient of variation threshold
  
  # Stationarity test
  stationarity:
    test: "adf"  # Augmented Dickey-Fuller
    significance_level: 0.05
  
  # Data sufficiency thresholds
  data_sufficiency:
    min_for_ml: 100
    min_for_deep_learning: 200
    sparse_obs_per_year: 5  # Fewer than 5 obs/year → sparse_data methods

# Forecasting Configuration
forecasting:
  horizon: 24  # Number of periods to forecast (2 years monthly)
  frequency: "M"  # D, W, M, Q, Y
  
  # Backtesting configuration
  backtesting:
    n_windows: 3        # Number of rolling origins to evaluate
    step_size: 1        # Periods between consecutive origins
    # First origin is always earliest_obs + 2 years (auto-detected from data).
    # Backtest is attempted for ALL series regardless of length.
    min_train_size: 12  # Kept for backward-compat; no longer gates backtesting
  
  # Prediction intervals
  confidence_levels: [10, 25, 50, 75, 90, 95, 99]  # For MEIO
  
  # Method selection based on characteristics
  method_selection:
    sparse_data: ["SeasonalNaive", "HistoricAverage", "TimesFM"]
    intermittent: ["CrostonOptimized", "ADIDA", "IMAPA", "TimesFM"]
    seasonal: ["MSTL", "AutoETS", "NHITS", "PatchTST", "TimesFM", "LightGBM"]
    complex: ["NHITS", "NBEATS", "TFT", "PatchTST", "AutoETS", "LightGBM", "XGBoost"]
    standard: ["AutoETS", "AutoARIMA", "AutoTheta", "NHITS", "TimesFM", "LightGBM"]

  # ML models
  ml_models:
    - LightGBM
    - XGBoost
  
  # Nixtla StatsForecast models
  statsforecast_models:
    - AutoARIMA
    - AutoETS
    - AutoTheta
    - AutoCES
    - MSTL
    - CrostonOptimized
    - ADIDA
    - IMAPA
    - HistoricAverage
    - SeasonalNaive
  
  # Nixtla NeuralForecast models
  neuralforecast_models:
    - NHITS
    - NBEATS
    - PatchTST
    - TFT
    - DeepAR
  
  # TimesFM configuration
  timesfm:
    model_name: "timesfm-1.0-200m"
    context_length: 512
    horizon_length: 128
    quantiles: [0.1, 0.25, 0.5, 0.75, 0.9, 0.95, 0.99]

# Hierarchical Forecasting
hierarchical:
  enabled: true
  reconciliation_methods:
    - "BottomUp"
    - "TopDown"
    - "MinTrace"
    - "ERM"  # Empirical Risk Minimization
  
  # Structure definition
  structure:
    levels: ["hierarchy_level_1", "hierarchy_level_2", "hierarchy_level_3", "sku_id"]

# Evaluation Metrics
evaluation:
  metrics:
    point_forecast:
      - "mae"
      - "rmse"
      - "mape"
      - "smape"
      - "bias"
      - "mase"
    
    probabilistic:
      - "winkler_score"
      - "crps"  # Continuous Ranked Probability Score
      - "coverage"
      - "quantile_loss"
    
    information_criteria:
      - "aic"
      - "bic"
      - "aicc"

# Best Method Selection
best_method:
  # Weights for composite scoring (must sum to 1.0)
  weights:
    mae: 0.40
    rmse: 0.20
    bias: 0.15
    coverage_90: 0.15
    mase: 0.10

# Distribution Fitting for MEIO
meio:
  enabled: true
  
  # Distribution types to test
  distributions:
    - "normal"
    - "gamma"
    - "negative_binomial"
    - "lognormal"
  
  # Fitting method
  fitting_method: "quantile_matching"  # or "mle" (maximum likelihood)
  
  # Service levels for safety stock calculation
  service_levels: [0.90, 0.95, 0.99]

# Parallel Processing
parallel:
  backend: "dask"
  
  dask:
    scheduler: "processes"  # processes, threads, distributed
    n_workers: 48  # 48 processes × 2 threads = 96 slots → 400% of 24 cores
    threads_per_worker: 2  # numba/numpy releases GIL; 2 threads per worker is effective
    memory_limit: "auto"

    # Prevent heartbeat / comm timeouts on Windows under load
    heartbeat_interval: "10s"
    death_timeout: 120   # seconds before scheduler considers a worker dead

    # For distributed setup
    distributed:
      scheduler_address: null  # "tcp://scheduler:8786"

  # Batch size for processing
  batch_size: 100  # ~100 series per batch for stable worker task granularity

# Output Configuration
output:
  base_path: "./output"
  
  # What to save
  save:
    forecasts: true
    characteristics: true
    metrics: true
    distributions: true
    hyperparameters: true
    plots: true
  
  # Output formats
  formats:
    forecasts: "postgres"
    metrics: "postgres"
    plots: "png"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/forecasting.log"
  console: true
